<div id="gate">

  <h1>ADMIN ACCESS</h1>
  <input id="gate-input" type="password" placeholder="Enter code" maxlength="20"
    onkeydown="if(event.key==='Enter')checkGate()">
  <button onclick="checkGate()">ENTER</button>
  <div class="gate-err" id="gate-err"></div>
</div>

<div id="pin-gate" class="hidden">
  <div class="gate-logo">RN</div>
  <h1>SHOP PIN</h1>
  <input id="pin-gate-input" type="password" placeholder="Enter PIN" maxlength="20"
    onkeydown="if(event.key==='Enter')checkPinGate()">
  <button onclick="checkPinGate()">ENTER</button>
  <div class="gate-err" id="pin-gate-err"></div>
</div>

<div id="root"></div>

<script>
const SHOP_PIN = '1439';
function checkGate(){
  const v=document.getElementById('gate-input').value.trim();
  if(v==='gabby'){
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('pin-gate').classList.remove('hidden');
    document.getElementById('pin-gate-input').focus();
  } else {
    document.getElementById('gate-err').textContent='Invalid code.';
    document.getElementById('gate-input').value='';
  }
}
function checkPinGate(){
  const v=document.getElementById('pin-gate-input').value.trim();
  if(v===SHOP_PIN){
    document.getElementById('pin-gate').classList.add('hidden');
    // Babel compiles text/babel scripts async — retry until renderShop is ready
    (function tryRender(n){
      if(typeof window.renderShop==='function'){ window.renderShop(); }
      else if(n>0){ setTimeout(function(){ tryRender(n-1); },80); }
    })(30);
  } else {
    document.getElementById('pin-gate-err').textContent='Invalid PIN.';
    document.getElementById('pin-gate-input').value='';
  }
}
document.getElementById('gate-input').focus();
</script>

.vpn-tabs{display:flex;gap:6px}
.vpn-tab{padding:7px 14px;border-radius:4px;border:1px solid #1E1A38;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;transition:all .15s;background:transparent;color:#6B5F9E;position:relative;overflow:hidden}
.vpn-tab.active{border-color:#9b30ff;color:#9b30ff;background:#9b30ff11;box-shadow:0 0 12px #9b30ff44}
.vpn-badge-count{display:inline-block;margin-left:5px;background:#9b30ff;color:#fff;border-radius:99px;padding:0 5px;font-size:9px;line-height:1.6;vertical-align:middle}
.vpn-main{max-width:900px;margin:0 auto;padding:18px 14px 60px;position:relative;z-index:1}
.vpn-search-wrap{position:relative;margin-bottom:20px}
.vpn-search{width:100%;padding:13px 16px 13px 42px;border-radius:6px;border:1px solid #c9c9e855;background:#0D0B1E;color:#F0EEFF;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s}
.vpn-search:focus{border-color:#c9c9e8;box-shadow:0 0 0 2px #c9c9e822,0 0 20px #c9c9e822}
.vpn-search::placeholder{color:#6B5F9E}
.vpn-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#c9c9e8;font-size:16px;pointer-events:none}
.vpn-cat-label{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:24px}
.vpn-cat-label span{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:#FF6B1A;text-transform:uppercase}
.vpn-cat-line{flex:1;height:1px;background:linear-gradient(90deg,#FF6B1A44,transparent)}
.vpn-card{background:#110F22;border:1px solid #1E1A38;border-radius:6px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden}
.vpn-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--vc,#9b30ff);opacity:0;transition:opacity .15s}
.vpn-card.in-cart{border-color:#c9c9e866;box-shadow:0 0 14px #c9c9e818}
.vpn-card.in-cart::before{opacity:1}
.vpn-card-info{flex:1;min-width:0}
.vpn-card-name{font-size:14px;font-weight:700;color:#F0EEFF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.vpn-card-spec{font-size:12px;color:#6B5F9E;margin-top:1px}
.vpn-vendor-pill{display:inline-block;margin-top:5px;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:.5px;border:1px solid var(--vc);color:var(--vc);background:color-mix(in srgb,var(--vc) 12%,transparent)}
.vpn-price{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:#c9c9e8;text-shadow:0 0 12px #c9c9e888;flex-shrink:0}
.vpn-add-btn{padding:7px 13px;border-radius:4px;border:1px solid #9b30ff;background:transparent;color:#9b30ff;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;flex-shrink:0}
.vpn-add-btn:hover{background:#9b30ff22;box-shadow:0 0 10px #9b30ff44}
.vpn-add-btn.added{border-color:#c9c9e8;color:#c9c9e8;background:#c9c9e811}
.vpn-vendor-block{margin-bottom:18px}
.vpn-vendor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.vpn-vendor-name{display:flex;align-items:center;gap:8px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#F0EEFF;letter-spacing:1px}
.vpn-vendor-dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px var(--vc);background:var(--vc);flex-shrink:0}
.vpn-vendor-sub{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#c9c9e8;text-shadow:0 0 8px #c9c9e888}
.vpn-cart-panel{background:#110F22;border:1px solid #1E1A38;border-radius:6px;overflow:hidden}
.vpn-cart-row{padding:10px 13px;display:flex;align-items:center;gap:10px}
.vpn-cart-row+.vpn-cart-row{border-top:1px solid #07060F}
.vpn-cart-row-info{flex:1;min-width:0}
.vpn-cart-row-name{font-size:13px;font-weight:700;color:#F0EEFF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vpn-cart-row-spec{font-size:11px;color:#6B5F9E}
.vpn-qty{width:46px;padding:5px 4px;border-radius:4px;border:1px solid #1E1A38;background:#07060F;color:#F0EEFF;font-family:'Orbitron',sans-serif;font-size:12px;text-align:center;outline:none}
.vpn-row-price{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#c9c9e8;min-width:48px;text-align:right;text-shadow:0 0 8px #c9c9e866}
.vpn-remove{background:none;border:none;cursor:pointer;color:#6B5F9E;font-size:18px;line-height:1;padding:2px 4px;transition:color .15s}
.vpn-remove:hover{color:#9b30ff}
.neon-divider{height:1px;background:linear-gradient(90deg,transparent,#9b30ff66,#c9c9e866,transparent);margin:6px 0 18px}
.vpn-total-panel{background:#0D0B1E;border:1px solid #9b30ff44;border-radius:6px;padding:16px;margin-top:10px;box-shadow:0 0 24px #9b30ff18}
.vpn-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.vpn-total-label{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#6B5F9E;letter-spacing:2px}
.vpn-total-amount{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;background:linear-gradient(90deg,#c9c9e8,#9b30ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.vpn-copy-btn{width:100%;padding:14px;border-radius:5px;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;transition:all .2s}
.vpn-copy-btn.idle{background:linear-gradient(90deg,#9b30ff,#9B30FF);color:#fff;box-shadow:0 0 20px #9b30ff66,0 0 40px #9B30FF33}
.vpn-copy-btn.idle:hover{box-shadow:0 0 30px #9b30ff88,0 0 60px #9B30FF44;transform:translateY(-1px)}
.vpn-copy-btn.done{background:linear-gradient(90deg,#00c97a,#c9c9e8);color:#000;box-shadow:0 0 20px #c9c9e866}
.vpn-hint{font-size:11px;color:#6B5F9E;text-align:center;margin-top:8px;font-family:'Rajdhani',sans-serif}
.vpn-empty{text-align:center;padding:60px 20px}
.vpn-empty-icon{font-size:42px;margin-bottom:12px}
.vpn-empty-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#6B5F9E;letter-spacing:1px}
.vpn-empty-sub{font-size:13px;color:#6B5F9E44;margin-top:6px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
`;

function VPNPeptideShop() {
  const [search, setSearch] = useState("");
  const [cart, setCart] = useState([]);
  const [copied, setCopied] = useState(false);
  const [copiedVendor, setCopiedVendor] = useState(null);
  const [tab, setTab] = useState("browse");

  useEffect(() => {
    const el = document.createElement("style");
    el.textContent = css;
    document.head.appendChild(el);
    return () => document.head.removeChild(el);
  }, []);

  const categories = useMemo(() => {
    const seen = new Set();
    const unique = RAW_DATA.filter(item => {
      const k = `${item.product}|${item.spec}`;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });
    const map = {};
    unique.forEach(item => {
      const cat = getCat(item.product);
      if (!map[cat]) map[cat] = [];
      map[cat].push(item);
    });
    return map;
  }, []);

  const filtered = useMemo(() => {
    if (!search.trim()) return categories;
    const q = search.toLowerCase();
    const result = {};
    Object.entries(categories).forEach(([cat, items]) => {
      const matched = items.filter(i =>
        i.product.toLowerCase().includes(q) || i.spec.toLowerCase().includes(q)
      );
      if (matched.length) result[cat] = matched;
    });
    return result;
  }, [search, categories]);

  const inCart = item => cart.some(c => c.key === `${item.product}|${item.spec}`);
  const addToCart = item => {
    const key = `${item.product}|${item.spec}`;
    if (!cart.some(c => c.key === key))
      setCart(prev => [...prev, { ...item, key, qty: 1 }]);
  };
  const removeFromCart = key => setCart(prev => prev.filter(c => c.key !== key));
  const updateQty = (key, val) => {
    const n = Math.max(1, parseInt(val) || 1);
    setCart(prev => prev.map(c => c.key === key ? { ...c, qty: n } : c));
  };

  const cartByVendor = useMemo(() => {
    const map = {};
    cart.forEach(item => {
      if (!map[item.lowest]) map[item.lowest] = [];
      map[item.lowest].push(item);
    });
    return map;
  }, [cart]);

  const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

  const copyOrder = () => {
    if (!cart.length) return;
    let lines = ["🔒 RN PEPTIDE ORDER\nResearch Network\n"];
    Object.entries(cartByVendor).forEach(([vendor, items]) => {
      lines.push(`📦 ${vendor.toUpperCase()}`);
      items.forEach(i => lines.push(`  • ${i.product} ${i.spec}${i.qty > 1 ? ` x${i.qty}` : ""} — $${i.price * i.qty}`));
      lines.push(`  Subtotal: $${items.reduce((s,i) => s + i.price * i.qty, 0)}\n`);
    });
    lines.push(`💰 TOTAL: $${cartTotal}`);
    navigator.clipboard.writeText(lines.join("\n")).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2800);
    });
  };

  const copyVendorOrder = (vendor, items) => {
    const sub = items.reduce((s,i) => s + i.price * i.qty, 0);
    const contact = VENDOR_CONTACTS[vendor];
    let lines = [`🔒 RN ORDER — ${vendor.toUpperCase()}`, "Research Network\n"];
    items.forEach(i => lines.push(`• ${i.product} ${i.spec}${i.qty > 1 ? ` x${i.qty}` : ""} — $${i.price * i.qty}`));
    lines.push(`\nTotal: $${sub}`);
    if (contact?.telegram) lines.push(`\nSend to: ${contact.telegram}`);
    navigator.clipboard.writeText(lines.join("\n")).then(() => {
      setCopiedVendor(vendor);
      setTimeout(() => setCopiedVendor(null), 2800);
    });
  };

  return (
    <div className="vpn-app">
      <header className="vpn-header">
        <div className="vpn-header-inner">
          <div className="vpn-logo">
            <div className="vpn-badge">RN</div>
            <div className="vpn-title">
              <div className="vpn-title-top">VERIFIED PEPTIDES</div>
              <div className="vpn-title-sub">PRICE FINDER</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <a href="home.html" className="vpn-back">← BACK</a>
            <div className="vpn-tabs">
              <button className={`vpn-tab ${tab==="browse"?"active":""}`} onClick={()=>setTab("browse")}>BROWSE</button>
              <button className={`vpn-tab ${tab==="cart"?"active":""}`} onClick={()=>setTab("cart")}>
                ORDER{cart.length>0&&<span className="vpn-badge-count">{cart.length}</span>}
              </button>
              <button className={`vpn-tab ${tab==="vendors"?"active":""}`} onClick={()=>setTab("vendors")}>VENDORS</button>
            </div>
          </div>
        </div>
      </header>

      <main className="vpn-main">
        {tab==="browse" && (
          <>
            <div className="vpn-search-wrap">
              <span className="vpn-search-icon">⌕</span>
              <input className="vpn-search" value={search}
                onChange={e=>setSearch(e.target.value)}
                placeholder="Search peptides, specs..." />
            </div>
            {Object.entries(filtered).map(([cat, items]) => (
              <div key={cat}>
                <div className="vpn-cat-label">
                  <span>{cat}</span>
                  <div className="vpn-cat-line" />
                </div>
                {items.map((item, i) => {
                  const vc = VENDOR_COLORS[item.lowest] || "#9b30ff";
                  const added = inCart(item);
                  return (
                    <div key={i} className={`vpn-card ${added?"in-cart":""}`} style={{"--vc":vc}}>
                      <div className="vpn-card-info">
                        <div className="vpn-card-name">{item.product}</div>
                        <div className="vpn-card-spec">{item.spec}</div>
                        <span className="vpn-vendor-pill" style={{"--vc":vc}}>{item.lowest}</span>
                      </div>
                      <div className="vpn-price">${item.price}</div>
                      <button className={`vpn-add-btn ${added?"added":""}`}
                        onClick={()=>added?removeFromCart(`${item.product}|${item.spec}`):addToCart(item)}>
                        {added?"✓ IN":"+ ADD"}
                      </button>
                    </div>
                  );
                })}
              </div>
            ))}
          </>
        )}

        {tab==="vendors" && (
          <div>
            <div style={{marginBottom:"20px"}}>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"10px",fontWeight:700,color:"#FF6B1A",letterSpacing:"2px",marginBottom:"4px"}}>VENDOR DIRECTORY</div>
              <div style={{fontSize:"12px",color:"#6B5F9E"}}>Tap WhatsApp / Telegram to open directly · Copy order first then contact vendor</div>
            </div>
            {ALL_VENDORS.map(v=>{
              const vc = VENDOR_COLORS[v.key] || "#9B30FF";
              return (
                <div key={v.key} style={{background:"#110F22",border:`1px solid`,borderColor:v.inShop?"#1E1A38":"#2a1a3a",borderRadius:"8px",padding:"14px",marginBottom:"10px",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",left:0,top:0,bottom:0,width:"3px",background:vc}} />
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"8px",marginBottom:"8px"}}>
                    <div>
                      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"12px",fontWeight:700,color:"#F0EEFF",letterSpacing:".5px"}}>
                        {v.flag} {v.display}
                      </div>
                      {v.notes && <div style={{fontSize:"11px",color:"#6B5F9E",marginTop:"3px"}}>{v.notes}</div>}
                    </div>
                    {v.inShop && <span style={{fontSize:"9px",fontFamily:"'Orbitron',sans-serif",color:vc,border:`1px solid ${vc}55`,borderRadius:"3px",padding:"2px 6px",whiteSpace:"nowrap"}}>IN SHOP</span>}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                    {v.whatsapp && (
                      <a href={`https://wa.me/${v.whatsapp}`} target="_blank" rel="noopener noreferrer"
                        style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"6px 12px",borderRadius:"4px",border:"1px solid #25D36688",background:"#25D36615",color:"#25D366",fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none"}}>
                        💬 +{v.whatsapp}
                      </a>
                    )}
                    {v.telegram && (
                      <a href={`https://t.me/${v.telegram}`} target="_blank" rel="noopener noreferrer"
                        style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"6px 12px",borderRadius:"4px",border:"1px solid #2AABEE88",background:"#2AABEE15",color:"#2AABEE",fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none"}}>
                        ✈ @{v.telegram}
                      </a>
                    )}
                    {v.phone && (
                      <a href={`tel:${v.phone}`}
                        style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"6px 12px",borderRadius:"4px",border:"1px solid #c9c9e888",background:"#c9c9e815",color:"#c9c9e8",fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none"}}>
                        📞 {v.phone}
                      </a>
                    )}
                    {v.discord && (
                      <a href={`https://${v.discord}`} target="_blank" rel="noopener noreferrer"
                        style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"6px 12px",borderRadius:"4px",border:"1px solid #7289DA88",background:"#7289DA15",color:"#7289DA",fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none"}}>
                        🎮 Discord
                      </a>
                    )}
                    {v.website && (
                      <a href={`https://${v.website}`} target="_blank" rel="noopener noreferrer"
                        style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"6px 12px",borderRadius:"4px",border:"1px solid #FF6B1A88",background:"#FF6B1A15",color:"#FF6B1A",fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none"}}>
                        🌐 {v.website}
                      </a>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="cart" && (
          <>
            {cart.length===0 ? (
              <div className="vpn-empty">
                <div className="vpn-empty-icon">🧬</div>
                <div className="vpn-empty-title">ORDER LIST EMPTY</div>
                <div className="vpn-empty-sub">Add peptides from Browse to build your order</div>
              </div>
            ) : (
              <>
                {Object.entries(cartByVendor).map(([vendor, items]) => {
                  const vc = VENDOR_COLORS[vendor] || "#9b30ff";
                  const sub = items.reduce((s,i)=>s+i.price*i.qty,0);
                  return (
                    <div key={vendor} className="vpn-vendor-block">
                      <div className="vpn-vendor-header">
                        <div className="vpn-vendor-name">
                          <div className="vpn-vendor-dot" style={{"--vc":vc}} />
                          {vendor}
                        </div>
                        <div className="vpn-vendor-sub">${sub}</div>
                      </div>
                      {VENDOR_CONTACTS[vendor] && (
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px",gap:"8px",flexWrap:"wrap"}}>
                          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                            {VENDOR_CONTACTS[vendor].whatsapp && (
                              <a href={`https://wa.me/${VENDOR_CONTACTS[vendor].whatsapp}`}
                                target="_blank" rel="noopener noreferrer"
                                style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"4px",border:"1px solid #25D36688",color:"#25D366",fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none",background:"#25D36615"}}>
                                💬 WhatsApp
                              </a>
                            )}
                            {VENDOR_CONTACTS[vendor].telegram && (
                              <a href={`https://t.me/${VENDOR_CONTACTS[vendor].telegram}`}
                                target="_blank" rel="noopener noreferrer"
                                style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"4px",border:"1px solid #2AABEE88",color:"#2AABEE",fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none",background:"#2AABEE15"}}>
                                ✈ Telegram
                              </a>
                            )}
                            {VENDOR_CONTACTS[vendor].phone && (
                              <a href={`tel:${VENDOR_CONTACTS[vendor].phone}`}
                                style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"4px",border:`1px solid ${vc}55`,color:vc,fontSize:"11px",fontFamily:"'Orbitron',sans-serif",fontWeight:700,textDecoration:"none",background:`color-mix(in srgb,${vc} 10%,transparent)`}}>
                                📞 Call
                              </a>
                            )}
                          </div>
                          <button onClick={()=>copyVendorOrder(vendor,items)}
                            style={{padding:"4px 12px",borderRadius:"4px",border:`1px solid ${vc}`,background:copiedVendor===vendor?vc:"transparent",color:copiedVendor===vendor?"#000":vc,fontFamily:"'Orbitron',sans-serif",fontSize:"9px",fontWeight:700,letterSpacing:"1px",cursor:"pointer",transition:"all .15s"}}>
                            {copiedVendor===vendor?"✓ COPIED":"📋 COPY ORDER"}
                          </button>
                        </div>
                      )}
                      <div className="vpn-cart-panel">
                        {items.map(item=>(
                          <div key={item.key} className="vpn-cart-row">
                            <div className="vpn-cart-row-info">
                              <div className="vpn-cart-row-name">{item.product}</div>
                              <div className="vpn-cart-row-spec">{item.spec} · ${item.price} ea</div>
                            </div>
                            <input type="number" className="vpn-qty" min="1" value={item.qty}
                              onChange={e=>updateQty(item.key,e.target.value)} />
                            <div className="vpn-row-price">${item.price*item.qty}</div>
                            <button className="vpn-remove" onClick={()=>removeFromCart(item.key)}>×</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
                <div className="neon-divider" />
                <div className="vpn-total-panel">
                  <div className="vpn-total-row">
                    <div className="vpn-total-label">GRAND TOTAL</div>
                    <div className="vpn-total-amount">${cartTotal}</div>
                  </div>
                  <button className={`vpn-copy-btn ${copied?"done":"idle"}`} onClick={copyOrder}>
                    {copied?"✓ COPIED — READY TO SEND":"📋 COPY ORDER TO SEND"}
                  </button>
                  <div className="vpn-hint">Pastes a vendor-grouped list · ready to text or message</div>
                </div>
              </>
            )}
          </>
        )}
      </main>
    </div>
  );
}

function renderShop() {
  ReactDOM.createRoot(document.getElementById('root')).render(<VPNPeptideShop />);
}
window.renderShop = renderShop;
</script>
<button id="vpn-back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top" style="position:fixed;bottom:24px;right:20px;width:50px;height:50px;border-radius:50%;background:rgba(201,201,232,0.12);border:2px solid #c9c9e8;color:#c9c9e8;font-size:1.5rem;line-height:1;cursor:pointer;z-index:99999;display:none;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(201,201,232,0.45);backdrop-filter:blur(4px);transition:opacity 0.2s,transform 0.2s;">↑</button>
<script>
(function(){
  var btn = document.getElementById('vpn-back-to-top');
  if(!btn) return;
  function toggle(){ btn.style.display = (window.scrollY > 400) ? 'flex' : 'none'; }
  window.addEventListener('scroll', toggle, {passive:true});
  toggle();
  btn.addEventListener('mouseover', function(){ btn.style.boxShadow='0 0 28px rgba(201,201,232,0.7)'; btn.style.transform='translateY(-2px)'; });
  btn.addEventListener('mouseout', function(){ btn.style.boxShadow='0 0 18px rgba(201,201,232,0.45)'; btn.style.transform='translateY(0)'; });
})();
</script>

</body>
</html>
